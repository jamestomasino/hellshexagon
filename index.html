<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hell's Hexagon</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <section id="hex-board" class="hex-board" aria-label="Daily puzzle grid"></section>
      <div id="scene-loader" class="scene-loader" role="status" aria-live="polite">
        <span class="scene-loader-spinner" aria-hidden="true"></span>
        <span class="scene-loader-text">Loading today&apos;s puzzle...</span>
      </div>
      <div class="top-bar">
        <h1 class="site-title">Hell's Hexagon</h1>
        <div class="top-actions">
          <div class="date-panel" id="date-panel">
            <span class="date-panel-label">Puzzle for</span>
            <button id="puzzle-date-toggle" class="puzzle-date-toggle" type="button" aria-haspopup="listbox" aria-expanded="false">
              <span id="puzzle-date-text"></span>
              <span class="puzzle-date-arrow" aria-hidden="true">▾</span>
            </button>
            <div id="puzzle-date-menu" class="puzzle-date-menu" role="listbox" hidden></div>
          </div>
          <section id="leaderboard-panel" class="leaderboard-panel" aria-label="Puzzle leaderboard">
            <div class="leaderboard-row">
              <span class="leaderboard-label">Shortest chain</span>
              <span id="leaderboard-shortest" class="leaderboard-value">—</span>
            </div>
            <div class="leaderboard-row">
              <span class="leaderboard-label">Solves</span>
              <span id="leaderboard-solves" class="leaderboard-value">0</span>
            </div>
            <div id="leaderboard-status" class="leaderboard-status"></div>
            <div id="leaderboard-histogram" class="leaderboard-histogram" aria-label="Solve length distribution"></div>
          </section>
          <button id="check-puzzle-button" class="check-puzzle-button" type="button">Check puzzle</button>
          <button
            id="scores-toggle-button"
            class="scores-toggle-button"
            type="button"
            aria-expanded="false"
            aria-controls="leaderboard-panel"
          >
            Scores
          </button>
          <a class="help-link" href="/instructions.html">How To Play</a>
        </div>
      </div>
      <div id="tile-dialog-overlay" class="tile-dialog-overlay" hidden>
        <section id="tile-dialog" class="tile-dialog" role="dialog" aria-modal="true" aria-labelledby="tile-dialog-title">
          <button id="tile-dialog-close" class="tile-dialog-close" type="button" aria-label="Close dialog">
            X
          </button>
          <header class="tile-dialog-header">
            <h2 id="tile-dialog-title">Connection</h2>
          </header>
          <div id="tile-chain-stack" class="tile-chain-stack"></div>
        </section>
      </div>
      <div id="score-overlay" class="score-overlay" hidden>
        <section class="score-dialog" role="dialog" aria-modal="true" aria-labelledby="score-title">
          <button id="score-close" class="score-close" type="button" aria-label="Close score dialog">X</button>
          <header class="score-header">
            <h2 id="score-title">Puzzle Check</h2>
            <p id="score-summary" class="score-summary"></p>
          </header>
          <div id="score-results" class="score-results"></div>
        </section>
      </div>
    </main>
    <script src="/shared/puzzle-logic.js" defer></script>
    <script src="/app.js" defer></script>
  </body>
</html>
