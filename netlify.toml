[build]
  publish = "."
  functions = "netlify/functions"

[functions."rotate-daily"]
  schedule = "@daily"

[[redirects]]
  from = "/api/daily"
  to = "/.netlify/functions/daily-puzzle"
  status = 200

[[redirects]]
  from = "/api/rotate"
  to = "/.netlify/functions/rotate-daily"
  status = 200

[[redirects]]
  from = "/api/dates"
  to = "/.netlify/functions/puzzle-dates"
  status = 200
